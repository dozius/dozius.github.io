<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">
    <title>Dozius' Links</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="../assets/icon.png" type="image/x-icon"/>
    <link href="../assets/fontawesome-5.12.1/css/all.css" rel="stylesheet">
</head>
<body>
    <img id="user_photo" src="../assets/user-icon.jpg" alt="User Photo">
    <p id="user_name">Dozius</p>
    <div id="links">
        <a class="link_box" href="https://github.com/dozius" target="_blank">
            <div class="link_icon"><i class="fab fa-github"></i></div>
            <div class="link_text">Github</div>
            <div class="right"></div>
        </a>
        <a class="link_box" href="https://cisc.bandcamp.com" target="_blank">
            <div class="link_icon"><i class="fab fa-bandcamp"></i></div>
            <div class="link_text">Bandcamp</div>
            <div class="right"></div>
        </a>
        <a class="link_box" href="https://soundcloud.com/cisc" target="_blank">
            <div class="link_icon"><i class="fab fa-soundcloud"></i></div>
            <div class="link_text">Soundcloud</div>
            <div class="right"></div>
        </a>
        <a class="link_box" href="https://twitter.com/ciscmusic" target="_blank">
            <div class="link_icon"><i class="fab fa-twitter"></i></div>
            <div class="link_text">Twitter</div>
            <div class="right"></div>
        </a>
        <a class="link_box" href="https://www.discogs.com/artist/331177-Cisc" target="_blank">
            <div class="link_icon"><i class="fas fa-compact-disc"></i></div>
            <div class="link_text">Discogs</div>
            <div class="right"></div>
        </a>
    </div>
</body>
</html>
